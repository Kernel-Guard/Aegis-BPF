name: ARM64 Production Validation

# Validates AegisBPF on ARM64 (aarch64) targets:
# 1. Cross-compile from x86_64 host
# 2. Run userspace tests under QEMU aarch64 emulation
# 3. Verify binary correctness and architecture
#
# For real ARM64 hardware validation (AWS Graviton),
# use workflow_dispatch with a self-hosted ARM64 runner.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'bpf/**'
      - 'CMakeLists.txt'
      - '.github/workflows/arm64-production.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'bpf/**'
      - 'CMakeLists.txt'
      - '.github/workflows/arm64-production.yml'
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner label (use "self-hosted-arm64" for real hardware)'
        required: false
        default: 'ubuntu-24.04'

permissions:
  contents: read

jobs:
  # Cross-compile and verify arm64 binary
  cross-compile:
    name: Cross-compile ARM64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compilation toolchain
        run: |
          sudo dpkg --add-architecture arm64

          # Restrict existing sources to amd64
          if [[ -f /etc/apt/sources.list.d/ubuntu.sources ]]; then
            sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
            sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi

          # Add arm64 from ports
          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          SOURCES

          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            cmake ninja-build pkg-config \
            libbpf-dev:arm64 libelf-dev:arm64 zlib1g-dev:arm64

      - name: Configure for ARM64 (Release)
        run: |
          cmake -S . -B build-arm64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DSKIP_BPF_BUILD=ON \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH="/usr/aarch64-linux-gnu;/usr" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu \
            -DCMAKE_INCLUDE_PATH=/usr/include \
            -DZLIB_LIBRARY=/usr/lib/aarch64-linux-gnu/libz.so \
            -DZLIB_INCLUDE_DIR=/usr/include
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig

      - name: Build for ARM64
        run: cmake --build build-arm64

      - name: Verify ARM64 binary
        run: |
          echo "=== Binary verification ==="
          file build-arm64/aegisbpf
          file build-arm64/aegisbpf | grep -q "aarch64" || { echo "ERROR: Not an ARM64 binary"; exit 1; }
          echo "✓ ARM64 binary verified"

          echo "=== Binary size ==="
          ls -lh build-arm64/aegisbpf
          SIZE=$(stat --format=%s build-arm64/aegisbpf)
          echo "Binary size: $SIZE bytes"

          # Warn if binary is suspiciously large (>10MB)
          if [ "$SIZE" -gt 10485760 ]; then
            echo "WARNING: Binary exceeds 10MB ($SIZE bytes)"
          fi

      - name: Upload ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: aegisbpf-arm64
          path: build-arm64/aegisbpf
          retention-days: 7

  # Run userspace tests under QEMU ARM64 emulation
  qemu-test:
    name: QEMU ARM64 Tests
    runs-on: ubuntu-24.04
    needs: cross-compile
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU and ARM64 libraries
        run: |
          sudo dpkg --add-architecture arm64

          if [[ -f /etc/apt/sources.list.d/ubuntu.sources ]]; then
            sudo sed -i '/^Architectures:/d' /etc/apt/sources.list.d/ubuntu.sources
            sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi

          cat <<'SOURCES' | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          SOURCES

          sudo apt-get update
          sudo apt-get install -y \
            qemu-user-static \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            cmake ninja-build pkg-config \
            libbpf-dev:arm64 libelf-dev:arm64 zlib1g-dev:arm64 \
            libgtest-dev:arm64 libgmock-dev:arm64 \
            libsystemd-dev:arm64

      - name: Configure for ARM64 (with tests)
        run: |
          cmake -S . -B build-arm64-test -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DSKIP_BPF_BUILD=ON \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_FIND_ROOT_PATH="/usr/aarch64-linux-gnu;/usr" \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu \
            -DCMAKE_INCLUDE_PATH=/usr/include \
            -DZLIB_LIBRARY=/usr/lib/aarch64-linux-gnu/libz.so \
            -DZLIB_INCLUDE_DIR=/usr/include \
            -DCMAKE_CROSSCOMPILING_EMULATOR="qemu-aarch64-static;-L;/usr/aarch64-linux-gnu"
        env:
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig

      - name: Build tests for ARM64
        run: cmake --build build-arm64-test

      - name: Run tests under QEMU
        run: |
          echo "=== Running ARM64 tests under QEMU ==="
          # Exclude tests that invoke the binary via Python subprocess
          # (subprocess doesn't use CMAKE_CROSSCOMPILING_EMULATOR, so
          # the ARM64 binary can't exec on the x86_64 host directly).
          ctest --test-dir build-arm64-test \
            --output-on-failure \
            --timeout 300 \
            --no-tests=error \
            --exclude-regex "upgrade_compat" \
            -j2
        env:
          QEMU_LD_PREFIX: /usr/aarch64-linux-gnu

      - name: Test summary
        if: always()
        run: |
          echo "=== ARM64 Test Results ==="
          ctest --test-dir build-arm64-test --no-tests=error -N 2>/dev/null | tail -5 || true

  # Architecture comparison report
  arch-report:
    name: Architecture Report
    runs-on: ubuntu-24.04
    needs: [cross-compile, qemu-test]
    if: always()
    steps:
      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: aegisbpf-arm64

      - name: Generate report
        run: |
          echo "# ARM64 Production Validation Report" > report.md
          echo "" >> report.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> report.md
          echo "**Commit:** ${{ github.sha }}" >> report.md
          echo "" >> report.md
          echo "## Binary Info" >> report.md
          echo '```' >> report.md
          file aegisbpf >> report.md
          ls -lh aegisbpf >> report.md
          echo '```' >> report.md
          echo "" >> report.md
          echo "## Cross-compile: ${{ needs.cross-compile.result }}" >> report.md
          echo "## QEMU Tests: ${{ needs.qemu-test.result }}" >> report.md
          echo "" >> report.md
          echo "## Architecture Support Matrix" >> report.md
          echo "" >> report.md
          echo "| Architecture | Status | CI | Notes |" >> report.md
          echo "|---|---|---|---|" >> report.md
          echo "| x86_64 | ✅ Production | Full test suite | Primary target |" >> report.md
          echo "| ARM64 (aarch64) | ✅ Production | Cross-compile + QEMU tests | Graviton3 validated |" >> report.md
          echo "| RISC-V | 🧪 Experimental | Build only | QEMU only |" >> report.md

          cat report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: arm64-validation-report
          path: report.md
          retention-days: 30
