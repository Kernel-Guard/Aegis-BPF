name: Veristat Complexity

on:
  push:
    branches: [main, develop]
    paths:
      - 'bpf/**'
      - 'config/veristat_baseline.json'
  pull_request:
    paths:
      - 'bpf/**'
      - 'config/veristat_baseline.json'
  workflow_dispatch:

jobs:
  veristat:
    name: veristat
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev pkg-config cmake ninja-build \
            linux-tools-common linux-tools-generic 2>/dev/null || true
          # The /usr/sbin/bpftool shim requires matching linux-tools for the
          # running kernel.  Replace it with the real binary so cmake picks it up.
          REAL_BPFTOOL=$(find /usr/lib/linux-tools/ -name bpftool -type f 2>/dev/null | sort -V | tail -1)
          if [[ -n "$REAL_BPFTOOL" ]]; then
            sudo cp "$REAL_BPFTOOL" /usr/sbin/bpftool
          fi

      - name: Check kernel BTF availability
        id: btf_check
        run: |
          if [[ -f /sys/kernel/btf/vmlinux ]]; then
            echo "btf_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "btf_available=false" >> "$GITHUB_OUTPUT"
            echo "Warning: No kernel BTF; veristat requires BTF for BPF compilation"
          fi

      - name: Configure (BPF build enabled)
        if: steps.btf_check.outputs.btf_available == 'true'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF

      - name: Build BPF object
        if: steps.btf_check.outputs.btf_available == 'true'
        run: cmake --build build --target bpf_skel

      - name: Run veristat complexity check
        if: steps.btf_check.outputs.btf_available == 'true'
        run: bash scripts/veristat_check.sh build/aegis.bpf.o

      - name: Update baseline (main branch only)
        if: steps.btf_check.outputs.btf_available == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          bash scripts/veristat_check.sh build/aegis.bpf.o --update-baseline
          if git diff --quiet config/veristat_baseline.json; then
            echo "Baseline unchanged"
          else
            echo "Baseline updated; uploading as artifact"
          fi

      - name: Upload veristat baseline
        if: steps.btf_check.outputs.btf_available == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: veristat-baseline
          path: config/veristat_baseline.json

      - name: Skip notice
        if: steps.btf_check.outputs.btf_available != 'true'
        run: echo "Skipping veristat - kernel BTF not available on this runner"
