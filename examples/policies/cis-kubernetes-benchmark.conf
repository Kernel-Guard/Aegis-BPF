# AegisBPF Policy — CIS Kubernetes Benchmark v1.8
#
# This policy implements file access controls aligned with CIS Kubernetes
# Benchmark recommendations. It protects critical Kubernetes component
# configuration files and secrets from unauthorized access.
#
# Applicable CIS Controls:
#   1.1.1-1.1.21  — Control plane configuration files
#   1.2.1-1.2.35  — API server arguments
#   3.1.1-3.1.4   — Authentication and authorization
#   4.1.1-4.1.10  — Worker node configuration
#   5.1.1-5.1.6   — RBAC and Service Accounts
#
# Usage:
#   sudo aegisbpf policy apply examples/policies/cis-kubernetes-benchmark.conf
#
# IMPORTANT: Add your cluster's service cgroup to [allow_cgroup] to avoid
# blocking legitimate Kubernetes components.
#
#@aegis-tags
#@id:         cis-kubernetes-benchmark
#@version:    1
#@mitre:      T1552.001, T1078.004, T1613
#@tactic:     TA0006, TA0003, TA0007
#@platform:   linux, containers, kubernetes
#@compliance: cis-k8s:1.1, cis-k8s:1.2, cis-k8s:3.1, cis-k8s:4.1, cis-k8s:5.1, nist-800-190:6.3.2
#@severity:   high
#@maturity:   stable
#@reference:  https://www.cisecurity.org/benchmark/kubernetes
#@end-tags

version=2

# ─── CIS 1.1: Control Plane Configuration Files ─────────────────────
# These files must be protected from unauthorized modification.
[deny_path]
# API Server configuration
/etc/kubernetes/manifests/kube-apiserver.yaml
/etc/kubernetes/manifests/kube-controller-manager.yaml
/etc/kubernetes/manifests/kube-scheduler.yaml
/etc/kubernetes/manifests/etcd.yaml

# PKI certificates and keys
/etc/kubernetes/pki/ca.key
/etc/kubernetes/pki/apiserver.key
/etc/kubernetes/pki/apiserver-kubelet-client.key
/etc/kubernetes/pki/front-proxy-ca.key
/etc/kubernetes/pki/front-proxy-client.key
/etc/kubernetes/pki/etcd/ca.key
/etc/kubernetes/pki/etcd/server.key
/etc/kubernetes/pki/etcd/peer.key
/etc/kubernetes/pki/sa.key

# Admin kubeconfig (high-privilege)
/etc/kubernetes/admin.conf
/etc/kubernetes/controller-manager.conf
/etc/kubernetes/scheduler.conf

# Etcd data directory
/var/lib/etcd

# ─── CIS 4.1: Worker Node Configuration ─────────────────────────────
# Protect kubelet configuration and credentials
/etc/kubernetes/kubelet.conf
/var/lib/kubelet/config.yaml
/var/lib/kubelet/kubeconfig

# Container runtime socket — prevent unauthorized container operations
/run/containerd/containerd.sock
/var/run/docker.sock
/run/crio/crio.sock

# ─── Credential & Secret Protection ─────────────────────────────────
# Cloud provider credentials
/root/.aws/credentials
/root/.kube/config
/home/*/.aws/credentials
/home/*/.kube/config

# Service account tokens (mounted in pods)
/var/run/secrets/kubernetes.io/serviceaccount/token

# ─── System-Level Protection ────────────────────────────────────────
# Critical system files
/etc/shadow
/etc/gshadow
/etc/sudoers
/etc/sudoers.d

# ─── Allow Kubernetes system cgroups ────────────────────────────────
# Uncomment and adjust for your cluster's cgroup hierarchy:
[allow_cgroup]
# /sys/fs/cgroup/system.slice/kubelet.service
# /sys/fs/cgroup/system.slice/containerd.service

# ─── Network Policy (CIS 5.3: Network Policies) ─────────────────────
# Block connections to common cloud metadata services
[deny_ip]
# AWS metadata service
169.254.169.254
# GCP metadata service
metadata.google.internal
# Azure metadata service
169.254.169.254

# Block connections to common exfiltration ports
[deny_port]
# IRC (common C2 channel)
6667:tcp:egress
6697:tcp:egress
# DNS over non-standard ports
5353:udp:egress

# ─── Kernel Security (MITRE ATT&CK Coverage) ────────────────────────
# Block ptrace injection (T1055.008)
[deny_ptrace]

# Block kernel module loading (T1547.006)
[deny_module_load]

# Block unauthorized BPF program loading (T1562)
[deny_bpf]
