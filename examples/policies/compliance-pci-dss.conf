# AegisBPF Policy — PCI DSS 4.0 Compliance
#
# Implements file access controls aligned with PCI DSS 4.0 requirements
# for cardholder data environment (CDE) protection.
#
# Applicable Requirements:
#   Req 1.3   — Network segmentation (deny unauthorized network access)
#   Req 2.2.7 — Non-console administrative access encrypted
#   Req 7.2   — Access control (restrict file access)
#   Req 8.3   — Authentication (protect credential stores)
#   Req 10.2  — Audit logging (protect log integrity)
#   Req 10.3  — Protect audit logs from modification
#   Req 11.3  — File integrity monitoring
#   Req 11.5  — Network intrusion detection
#
# Usage:
#   sudo aegisbpf policy apply examples/policies/compliance-pci-dss.conf
#
#@aegis-tags
#@id:         compliance-pci-dss
#@version:    1
#@mitre:      T1552.001, T1003.008, T1070
#@tactic:     TA0006, TA0005
#@platform:   linux
#@compliance: pci-dss-4:1.3, pci-dss-4:2.2.7, pci-dss-4:7.2, pci-dss-4:8.3, pci-dss-4:10.2, pci-dss-4:10.3, pci-dss-4:11.3, pci-dss-4:11.5
#@severity:   high
#@maturity:   stable
#@reference:  https://www.pcisecuritystandards.org/document_library
#@end-tags

version=2

# ─── Req 7.2 & 8.3: Access Control & Credential Protection ──────────
[deny_path]
# System credentials (Req 8.3.1)
/etc/shadow
/etc/gshadow
/etc/security/opasswd

# SSH private keys (Req 2.2.7)
/root/.ssh/id_rsa
/root/.ssh/id_ecdsa
/root/.ssh/id_ed25519

# PAM configuration (Req 8.3)
/etc/pam.d/common-auth
/etc/pam.d/sshd

# Database credential files (Req 8.3.2 — protect stored credentials)
/etc/mysql/debian.cnf
/var/lib/mysql/auto.cnf

# ─── Req 10.3: Protect Audit Log Integrity ──────────────────────────
# Prevent unauthorized modification of audit logs
/var/log/auth.log
/var/log/secure
/var/log/audit/audit.log
/var/log/syslog

# ─── Req 1.3 & 11.5: Network Segmentation ───────────────────────────
# Block outbound connections to common data exfiltration channels
[deny_port]
# FTP (unencrypted data transfer)
21:tcp:egress
20:tcp:egress
# Telnet (unencrypted)
23:tcp:egress
# SMTP without TLS (data exfiltration)
25:tcp:egress
# IRC (common C2)
6667:tcp:egress
6697:tcp:egress

# ─── Req 11.3: Kernel Integrity ─────────────────────────────────────
# Block kernel module loading (maintains system integrity)
[deny_module_load]

# Block ptrace (prevents memory scraping of cardholder data)
[deny_ptrace]

# Block BPF tampering (prevents security tool evasion)
[deny_bpf]

# ─── Allow Known Good Cgroups ───────────────────────────────────────
# Uncomment for your payment processing service cgroups:
[allow_cgroup]
# /sys/fs/cgroup/system.slice/payment-gateway.service
