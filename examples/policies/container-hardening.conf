# AegisBPF Policy — Container Hardening
#
# Recommended policy for containerized workloads. Blocks common container
# escape paths, credential theft, and lateral movement vectors.
#
# MITRE ATT&CK Techniques Covered:
#   T1552.001 — Credentials in Files (shadow, cloud creds)
#   T1611     — Escape to Host (container runtime sockets)
#   T1055.008 — Ptrace Process Injection
#   T1547.006 — Kernel Module Persistence
#   T1562.001 — Impair Defenses: Disable or Modify Tools (BPF tampering)
#   T1071     — Application Layer Protocol (egress filtering)
#
# Usage:
#   sudo aegisbpf policy apply examples/policies/container-hardening.conf
#
#@aegis-tags
#@id:         container-hardening
#@version:    1
#@mitre:      T1552.001, T1611, T1055.008, T1547.006, T1562.001, T1071
#@tactic:     TA0006, TA0004, TA0005, TA0003, TA0011
#@platform:   linux, containers
#@compliance: nist-800-190:6.4.1, nist-800-190:6.4.2, nist-800-190:6.5.2, nist-800-190:6.5.4, nist-800-53:AC-3, nist-800-53:SC-7
#@severity:   high
#@maturity:   stable
#@reference:  https://attack.mitre.org/matrices/enterprise/containers/
#@end-tags

version=2

# ─── Container Escape Prevention ────────────────────────────────────
[deny_path]
# Container runtime sockets — prevent container-in-container attacks
/run/containerd/containerd.sock
/var/run/docker.sock
/run/crio/crio.sock

# Host filesystem mounts that enable escape
/proc/sysrq-trigger
/proc/kcore
/proc/kmsg

# Sensitive host paths commonly mounted into containers
/etc/shadow
/etc/gshadow
/etc/sudoers

# Cloud metadata service config (SSRF prevention)
/root/.aws/credentials
/root/.aws/config
/root/.gcloud/credentials
/root/.azure/accessTokens.json

# SSH keys
/root/.ssh/id_rsa
/root/.ssh/id_ed25519

# ─── Network Egress Filtering ───────────────────────────────────────
# Block cloud metadata services (SSRF / credential theft)
[deny_ip]
169.254.169.254

# Block common C2 and exfiltration channels
[deny_port]
# IRC
6667:tcp:egress
6697:tcp:egress
# Telnet (plaintext C2)
23:tcp:egress
# SMTP (exfiltration)
25:tcp:egress
# FTP (exfiltration)
21:tcp:egress
20:tcp:egress

# ─── Kernel Security ────────────────────────────────────────────────
# Block ptrace injection (prevents attaching to other processes)
[deny_ptrace]

# Block kernel module loading (containers should never load modules)
[deny_module_load]

# Block BPF program loading (prevents eBPF-based attacks from containers)
[deny_bpf]
