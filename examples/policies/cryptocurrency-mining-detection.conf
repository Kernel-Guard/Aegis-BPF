# AegisBPF Policy — Cryptocurrency Mining Detection & Prevention
#
# Blocks known cryptocurrency mining pool connections and common
# mining software paths. This is a high-confidence detection rule
# since legitimate workloads almost never connect to mining pools.
#
# MITRE ATT&CK Techniques:
#   T1496 — Resource Hijacking (Cryptojacking)
#   T1071 — Application Layer Protocol
#
# Usage:
#   sudo aegisbpf policy apply examples/policies/cryptocurrency-mining-detection.conf

version=2

# ─── Known Mining Software Paths ────────────────────────────────────
[deny_path]
# XMRig (Monero miner — most common cryptojacker)
/tmp/xmrig
/tmp/.xmrig
/var/tmp/xmrig
/dev/shm/xmrig

# Other common mining binary locations
/tmp/minergate
/tmp/cpuminer
/tmp/ccminer
/tmp/ethminer
/tmp/t-rex
/tmp/nbminer
/tmp/phoenixminer
/tmp/lolminer

# Hidden mining directories
/tmp/.mining
/tmp/.miner
/var/tmp/.miner
/dev/shm/.miner

# ─── Mining Pool Connection Blocking ────────────────────────────────
# Common Stratum mining pool ports
[deny_port]
# Stratum protocol (mining pool standard)
3333:tcp:egress
4444:tcp:egress
5555:tcp:egress
7777:tcp:egress
8888:tcp:egress
9999:tcp:egress
14433:tcp:egress
14444:tcp:egress

# ─── Known Mining Pool IPs (Nanopool, 2Miners, etc.) ────────────────
# NOTE: Mining pools frequently change IPs. Maintain this list via
# policy updates. CIDR ranges cover common mining pool infrastructure.
[deny_cidr]
# Common mining pool infrastructure ranges (examples — update regularly)
# Uncomment and populate with current mining pool IPs from threat intel feeds
