# AegisBPF Policy — Minimal Getting Started
#
# A minimal policy for testing AegisBPF. Blocks access to /etc/shadow
# and enables kernel security hooks. Use this as a starting point for
# building your own policy.
#
# Quick Start:
#   # Start daemon in audit mode (won't block, just log)
#   sudo aegisbpf daemon --audit-only
#
#   # Apply this policy
#   sudo aegisbpf policy apply examples/policies/minimal-getting-started.conf
#
#   # Test: try to read /etc/shadow (should see a block event)
#   cat /etc/shadow
#
#   # View events
#   # Events are printed as JSON to stdout by the daemon
#
#   # Switch to enforce mode (will actually block access)
#   sudo aegisbpf daemon  # without --audit-only
#
#@aegis-tags
#@id:        minimal-getting-started
#@version:   1
#@mitre:     T1552.001, T1055.008
#@tactic:    TA0006, TA0004
#@platform:  linux
#@severity:  medium
#@maturity:  stable
#@end-tags

version=1

[deny_path]
/etc/shadow

[deny_ptrace]
