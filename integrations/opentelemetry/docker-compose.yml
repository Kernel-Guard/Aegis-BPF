# Docker Compose: AegisBPF + OpenTelemetry Collector + Jaeger
#
# Demonstrates the full AegisBPF → OTLP → Jaeger pipeline.
#
# Usage:
#   docker compose up -d
#   sudo aegisbpf daemon 2>&1 | python3 otlp-trace-exporter.py
#   # Open Jaeger UI: http://localhost:16686
#
# For Grafana Tempo instead of Jaeger, replace the jaeger service
# with a Tempo instance and update the collector config.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
