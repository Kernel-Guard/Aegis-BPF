# OpenTelemetry Collector configuration for AegisBPF traces
#
# Receives OTLP traces from the AegisBPF exporter and forwards
# them to Jaeger (or Tempo) for visualization and querying.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Add resource attributes for all AegisBPF traces
  resource:
    attributes:
      - key: service.namespace
        value: "security"
        action: upsert

  # Filter out low-value exec events if volume is too high
  filter/high-volume:
    traces:
      span:
        - 'name == "aegis.exec.*" and attributes["aegis.exec_identity_known"] == true'

exporters:
  # Send to Jaeger for trace visualization
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

  # Expose collector metrics for Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otel_collector"

  # Debug logging (disable in production)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
