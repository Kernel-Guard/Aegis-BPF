apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aegisclusterpolicies.aegisbpf.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: aegisbpf.io
  names:
    kind: AegisClusterPolicy
    listKind: AegisClusterPolicyList
    plural: aegisclusterpolicies
    singular: aegisclusterpolicy
    shortNames:
      - acp
    categories:
      - aegisbpf
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: EnforceCapable
          type: string
          jsonPath: .status.conditions[?(@.type=="EnforceCapable")].status
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: AegisClusterPolicy defines a cluster-wide security policy enforced by Aegis-BPF.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: AegisPolicySpec defines the desired state of an Aegis security policy.
              type: object
              required:
                - mode
              properties:
                mode:
                  type: string
                  enum:
                    - enforce
                    - audit
                  default: audit
                selector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchNamespaces:
                      type: array
                      items:
                        type: string
                fileRules:
                  type: object
                  properties:
                    deny:
                      type: array
                      items:
                        type: object
                        properties:
                          path:
                            type: string
                          inode:
                            type: string
                            pattern: '^\d+:\d+$'
                    protect:
                      type: array
                      items:
                        type: object
                        properties:
                          path:
                            type: string
                          inode:
                            type: string
                            pattern: '^\d+:\d+$'
                networkRules:
                  type: object
                  properties:
                    deny:
                      type: array
                      items:
                        type: object
                        properties:
                          ip:
                            type: string
                          cidr:
                            type: string
                          port:
                            type: integer
                            minimum: 1
                            maximum: 65535
                          protocol:
                            type: string
                            enum: [tcp, udp]
                          direction:
                            type: string
                            enum: [outbound, inbound]
                execRules:
                  type: object
                  properties:
                    allowBinaryHashes:
                      type: array
                      items:
                        type: string
                    denyBinaryHashes:
                      type: array
                      items:
                        type: string
                    denyComm:
                      type: array
                      items:
                        type: string
                kernelRules:
                  type: object
                  properties:
                    blockModuleLoad:
                      type: boolean
                    blockPtrace:
                      type: boolean
                    blockBpfSyscall:
                      type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Applied, Error]
                message:
                  type: string
                conditions:
                  description: |
                    Conditions report the current observed state of this policy.
                    Standard types: Ready, PolicyValid, EnforceCapable, Degraded.
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - lastTransitionTime
                      - message
                    properties:
                      type:
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      message:
                        type: string
                        maxLength: 32768
                appliedNodes:
                  type: integer
                lastAppliedAt:
                  type: string
                  format: date-time
                policyHash:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
