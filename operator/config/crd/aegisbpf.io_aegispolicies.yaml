apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aegispolicies.aegisbpf.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: aegisbpf.io
  names:
    kind: AegisPolicy
    listKind: AegisPolicyList
    plural: aegispolicies
    singular: aegispolicy
    shortNames:
      - ap
    categories:
      - aegisbpf
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Nodes
          type: integer
          jsonPath: .status.appliedNodes
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: AegisPolicy defines a namespaced security policy enforced by Aegis-BPF.
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: AegisPolicySpec defines the desired state of an Aegis security policy.
              type: object
              required:
                - mode
              properties:
                mode:
                  description: Mode controls whether the policy enforces or audits.
                  type: string
                  enum:
                    - enforce
                    - audit
                  default: audit
                selector:
                  description: Selector restricts which workloads this policy applies to.
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                    matchNamespaces:
                      type: array
                      items:
                        type: string
                fileRules:
                  description: FileRules defines file access deny and protect rules.
                  type: object
                  properties:
                    deny:
                      type: array
                      items:
                        type: object
                        properties:
                          path:
                            type: string
                          inode:
                            type: string
                            pattern: '^\d+:\d+$'
                    protect:
                      type: array
                      items:
                        type: object
                        properties:
                          path:
                            type: string
                          inode:
                            type: string
                            pattern: '^\d+:\d+$'
                networkRules:
                  description: NetworkRules defines network deny rules.
                  type: object
                  properties:
                    deny:
                      type: array
                      items:
                        type: object
                        properties:
                          ip:
                            type: string
                          cidr:
                            type: string
                          port:
                            type: integer
                            minimum: 1
                            maximum: 65535
                          protocol:
                            type: string
                            enum:
                              - tcp
                              - udp
                          direction:
                            type: string
                            enum:
                              - outbound
                              - inbound
                execRules:
                  description: ExecRules defines execution allow/deny rules.
                  type: object
                  properties:
                    allowBinaryHashes:
                      type: array
                      items:
                        type: string
                    denyBinaryHashes:
                      type: array
                      items:
                        type: string
                    denyComm:
                      type: array
                      items:
                        type: string
                kernelRules:
                  description: KernelRules defines kernel-level protection mechanisms.
                  type: object
                  properties:
                    blockModuleLoad:
                      type: boolean
                    blockPtrace:
                      type: boolean
                    blockBpfSyscall:
                      type: boolean
            status:
              description: AegisPolicyStatus defines the observed state.
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Applied
                    - Error
                message:
                  type: string
                appliedNodes:
                  type: integer
                lastAppliedAt:
                  type: string
                  format: date-time
                policyHash:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
