apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-operator
  namespace: aegisbpf-system
  labels:
    app.kubernetes.io/name: aegis-operator
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aegis-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aegis-operator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: aegis-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: ghcr.io/erenari/aegisbpf-operator:latest
          args:
            - --leader-elect=true
            - --enable-identity-resolution=true
            - --identity-refresh-interval=30s
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
