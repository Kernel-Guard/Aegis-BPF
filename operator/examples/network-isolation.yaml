apiVersion: aegisbpf.io/v1alpha1
kind: AegisPolicy
metadata:
  name: network-isolation
  namespace: production
spec:
  mode: enforce
  workloadSelector:
    podSelector:
      matchLabels:
        tier: backend
  networkRules:
    deny:
      # Block access to metadata service (cloud credential theft).
      # action: Block is the default and can be omitted.
      - ip: "169.254.169.254"
        protocol: tcp
        direction: outbound
      # Block outbound to known C2 ranges
      - cidr: "198.51.100.0/24"
        protocol: tcp
        direction: outbound
      # Block direct Redis access from non-cache pods
      - port: 6379
        protocol: tcp
        direction: outbound
      # Block outbound SSH
      - port: 22
        protocol: tcp
        direction: outbound
      # v0.5.0+: explicit Allow rules. Within a single spec, Allow and
      # Block must target *different* literals — same-target collisions
      # are rejected by the admission webhook because they are
      # ambiguous. Allow > Block merge precedence (across separate
      # policies) is documented in docs/POLICY_SEMANTICS.md.
      - ip: "10.20.30.40"  # internal observability collector
        protocol: tcp
        direction: outbound
        action: Allow
