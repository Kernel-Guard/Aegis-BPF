{{define "layout"}}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisBPF Console</title>
    <script src="/console/static/htmx.min.js"></script>
    <script src="/console/static/sse.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
        pre { tab-size: 4; }
        .htmx-settling { opacity: 0.8; }
        .htmx-swapping { opacity: 0.5; transition: opacity 0.15s ease-out; }
        /* Loading indicator */
        .htmx-request .htmx-indicator { display: inline-flex; }
        .htmx-indicator { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        /* Copy button tooltip */
        .copy-ok { position: relative; }
        .copy-ok::after { content: 'Copied!'; position: absolute; top: -1.5rem; left: 50%; transform: translateX(-50%); font-size: 0.625rem; background: #22c55e; color: #fff; padding: 0.125rem 0.375rem; border-radius: 0.25rem; pointer-events: none; animation: fade-in 0.2s ease-out; }
    </style>
    <script>
        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(function() {
                btn.classList.add('copy-ok');
                setTimeout(function() { btn.classList.remove('copy-ok'); }, 1200);
            });
        }
    </script>
</head>
<body class="h-full bg-gray-950 text-gray-100 font-sans" hx-ext="sse" sse-connect="/console/events">
    {{template "nav" .}}
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {{block "content" .}}{{end}}
    </main>
    <footer class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 text-center text-xs text-gray-600">
        AegisBPF Operator Console &middot; v0.5.0
    </footer>
</body>
</html>
{{end}}
