{{define "stats_cards"}}
<div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="stats-cards">
    <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Total Policies</div>
        <div class="mt-1 text-2xl font-bold text-white">{{.TotalPolicies}}</div>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Enforce Mode</div>
        <div class="mt-1 text-2xl font-bold text-red-400">{{.EnforceCount}}</div>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Applied</div>
        <div class="mt-1 text-2xl font-bold text-green-400">{{.AppliedCount}}</div>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
        <div class="text-xs text-gray-500 uppercase tracking-wider">Errors</div>
        <div class="mt-1 text-2xl font-bold {{if gt .ErrorCount 0}}text-red-400{{else}}text-gray-600{{end}}">{{.ErrorCount}}</div>
    </div>
</div>
{{end}}
